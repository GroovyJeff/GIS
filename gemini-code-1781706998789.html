<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GRASS Vector Web Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 100vh; width: 100%; margin: 0; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        // 1. Initialize the map container
        const map = L.map('map').setView([0, 0], 2);

        // 2. Add a clean, lightweight basemap
        L.tileLayer('https://{s}.basemap.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(map);

        // 3. Fetch and render your exported GRASS GeoJSON map
        fetch('my_web_map.geojson')
            .then(response => response.json())
            .then(geojsonData => {
                const vectorLayer = L.geoJSON(geojsonData, {
                    style: {
                        color: "#ff7800", // Outline Color
                        weight: 2,        // Outline Thickness
                        opacity: 0.8,
                        fillColor: "#00ff78",
                        fillOpacity: 0.4
                    }
                }).addTo(map);

                // Automatically zoom the web map to fit your vector boundaries
                map.fitBounds(vectorLayer.getBounds());
            });
    </script>
</body>
</html>
